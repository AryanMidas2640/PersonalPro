# Server Configuration
server.port=8080
server.servlet.context-path=/

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:newjobs}

# Security
spring.security.user.name=admin
spring.security.user.password=admin

# JWT Configuration
jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey123}
jwt.expiration=86400000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Application Settings
spring.application.name=AddressAPI

# Logical default DB key
db.defaultDb=primary

# Logical name ? Actual Mongo DB name mapping
db.databases.primary=addressDB
